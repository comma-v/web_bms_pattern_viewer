<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Button BMS Viewer (Reverse)</title>
    <style>
        canvas {
            background: linear-gradient(to top, #1a1a1a, #333);
            display: block;
            margin: 0 auto;
            border: 1px solid #666;
        }

        body {
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <h1>8-Button BMS Viewer (Reverse)</h1>
    <input type="file" id="fileInput" />
    <canvas id="viewer" width="1000" height="600"></canvas>
    <script>
        const canvas = document.getElementById("viewer");
        const ctx = canvas.getContext("2d");
        const notes = [];
        const keysPressed = new Set();

        // 새 8개의 키 매핑 (LeftShift, S, D, F, Space, J, K, L)
        const keyMap = {
            16: 0, // LeftShift
            83: 1, // S
            68: 2, // D
            70: 3, // F
            32: 4, // Space
            74: 5, // J
            75: 6, // K
            76: 7, // L
        };

        document.getElementById("fileInput").addEventListener("change", handleFile);
        document.addEventListener("keydown", (e) => keysPressed.add(e.keyCode));
        document.addEventListener("keyup", (e) => keysPressed.delete(e.keyCode));

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function () {
                const data = parseBMS(reader.result);
                initializeNotes(data);
                animate();
            };
            reader.readAsText(file);
        }

        function parseBMS(content) {
            const lines = content.split("\n");
            const parsedNotes = [];
            lines.forEach((line) => {
                const match = line.match(/^#(\d{3})(\d{2}):([\da-fA-F]+)/);
                if (match) {
                    const measure = parseInt(match[1]);
                    const channel = parseInt(match[2]);
                    const values = match[3];
                    if (channel >= 11 && channel <= 18) {
                        values.split("").forEach((value, index) => {
                            if (value !== "0") {
                                const timing = (measure + index / values.length) * 1000;
                                parsedNotes.push({ channel, timing });
                            }
                        });
                    }
                }
            });
            return parsedNotes;
        }

        function initializeNotes(data) {
            notes.length = 0; // Reset notes
            data.forEach((note) => {
                notes.push({
                    x: (note.channel - 11) * 50 + 50,  // 노트의 x 위치 설정
                    y: 0, // Start from the top
                    timing: note.timing,
                    hit: false,
                });
            });
        }

        function animate(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const currentTime = performance.now();

            // Draw keyboard input lines
            drawInputLines();

            // Draw notes
            notes.forEach((note) => {
                const speed = 0.5; // 배속 조정 (기존 0.2에서 0.5로 증가)
                note.y = (currentTime - note.timing) * speed;

                if (!note.hit && note.y > canvas.height) {
                    note.hit = true; // Mark as "missed"
                }

                if (note.y > 0 && note.y < canvas.height) {
                    ctx.fillStyle = "white";
                    ctx.fillRect(note.x, note.y, 50, 10);
                }
            });

            // Recursive animation
            requestAnimationFrame(animate);
        }

        function drawInputLines() {
            const laneHeight = 10;
            const laneY = canvas.height - 50; // Fixed position at the bottom of the canvas
            const laneSpacing = 50; // 라인 간격 조정

            for (let i = 0; i < 8; i++) {
                const x = i * laneSpacing + 50; // Calculate each lane's x position

                // Highlight active key
                const isPressed = Array.from(keysPressed).some(
                    (key) => keyMap[key] === i
                );

                // Draw the lane
                ctx.fillStyle = isPressed ? "rgba(255, 255, 255, 0.8)" : "rgba(200, 200, 200, 0.5)";
                ctx.fillRect(x, laneY, 50, laneHeight);

                // Draw the key label
                ctx.fillStyle = "white";
                ctx.font = "14px Arial";
                ctx.textAlign = "center";
                const keyName = Object.keys(keyMap).find((key) => keyMap[key] === i);
                ctx.fillText(String.fromCharCode(keyName), x + 25, laneY - 5);
            }
        }
    </script>
</body>

</html>
